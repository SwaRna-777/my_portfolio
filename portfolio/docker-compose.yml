version: "3.9"

services:
  portfolio:
    build:
      context: ../..          # workspace root (so monorepo files are available)
      dockerfile: artifacts/portfolio/Dockerfile
    image: portfolio:latest
    container_name: portfolio
    ports:
      - "80:80"               # Access at http://localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: serve on a custom port instead of 80 ──────────────────────────
  # portfolio:
  #   ports:
  #     - "8080:80"           # Access at http://localhost:8080
